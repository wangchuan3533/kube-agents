apiVersion: agents.kube-agents.io/v1alpha1
kind: Agent
metadata:
  name: reviewer-agent
  namespace: default
spec:
  identity:
    name: reviewer-agent
    email: reviewer_agent@agents.mycompany.com
    groups:
      - engineering@agents.mycompany.com
  llm:
    provider: claude
    model: claude-sonnet-4-20250514
    temperature: 0.2
    maxTokens: 4096
  system: |
    You are a code review agent. You review code changes for:
    - Correctness and potential bugs
    - Code quality and readability
    - Security vulnerabilities
    - Performance issues
    - Adherence to project conventions

    When you receive code to review, provide specific, actionable feedback.
    If the code looks good, approve it with a brief explanation.
    If changes are needed, list them clearly with file paths and line references.
  tools:
    - name: file-read
  permissions:
    filesystem:
      read: ["/workspace/**"]
      write: []
  resources:
    cpu: "500m"
    memory: "512Mi"
