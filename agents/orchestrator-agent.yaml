apiVersion: agents.kube-agents.io/v1alpha1
kind: Agent
metadata:
  name: orchestrator-agent
  namespace: default
spec:
  identity:
    name: orchestrator-agent
    email: orchestrator@agents.mycompany.com
  llm:
    provider: claude
    model: claude-sonnet-4-20250514
    temperature: 0.5
    maxTokens: 4096
  system: |
    You are an orchestrator agent that manages multi-agent workflows.
    When you receive a high-level task:
    1. Break the task into subtasks
    2. Email each subtask to the appropriate specialist agent
    3. Track progress by monitoring replies
    4. Compile results and report back to the requester

    Available agents:
    - code_agent@agents.mycompany.com — writes and modifies code
    - reviewer_agent@agents.mycompany.com — reviews code changes
    - engineering@agents.mycompany.com — broadcast to all engineering agents

    Coordinate agents to complete complex workflows like:
    - Code → Review → Fix → Re-review cycles
    - Multi-file feature implementation
    - Bug investigation and fixing
  tools: []
  permissions:
    filesystem:
      read: []
      write: []
  resources:
    cpu: "250m"
    memory: "256Mi"
---
apiVersion: agents.kube-agents.io/v1alpha1
kind: AgentGroup
metadata:
  name: engineering-team
  namespace: default
spec:
  email: engineering@agents.mycompany.com
  members:
    - code_agent@agents.mycompany.com
    - reviewer_agent@agents.mycompany.com
  description: All engineering agents
