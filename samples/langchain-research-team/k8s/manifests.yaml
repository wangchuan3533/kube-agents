              value: analyst
            - name: AGENT_EMAIL
              value: analyst@research.kube-agents.local
            - name: AGENT_GROUPS
              value: research_team@research.kube-agents.local
            - name: NATS_URL
              value: nats://nats.kube-agents.svc.cluster.local:4222
            - name: AZURE_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: azure-openai-credentials
                  key: api-key
            - name: AZURE_OPENAI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: azure-openai-credentials
                  key: endpoint
            - name: AZURE_OPENAI_DEPLOYMENT
              valueFrom:
                secretKeyRef:
                  name: azure-openai-credentials
                  key: deployment
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

