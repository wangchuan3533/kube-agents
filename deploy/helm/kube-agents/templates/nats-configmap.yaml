{{- if .Values.nats.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: {{ include "kube-agents.namespace" . }}
  labels:
    {{- include "kube-agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
data:
  nats.conf: |
    listen: 0.0.0.0:{{ .Values.nats.clientPort }}
    http: 0.0.0.0:{{ .Values.nats.monitorPort }}

    jetstream {
      store_dir: /data/jetstream
      max_mem: {{ .Values.nats.jetstream.maxMem }}
      max_file: {{ .Values.nats.jetstream.maxFile }}
    }
{{- end }}
