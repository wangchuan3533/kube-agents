{{- if .Values.dashboard.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-agents-dashboard
  labels:
    {{- include "kube-agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
rules:
  - apiGroups: ["agents.kube-agents.io"]
    resources: ["agents", "agentgroups"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["agents.kube-agents.io"]
    resources: ["agents/status", "agentgroups/status"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-agents-dashboard
  labels:
    {{- include "kube-agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-agents-dashboard
subjects:
  - kind: ServiceAccount
    name: kube-agents-dashboard
    namespace: {{ include "kube-agents.namespace" . }}
{{- end }}
