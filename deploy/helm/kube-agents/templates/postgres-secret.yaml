{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: {{ include "kube-agents.namespace" . }}
  labels:
    {{- include "kube-agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@postgres.%s.svc.cluster.local:5432/%s" .Values.postgres.user .Values.postgres.password (include "kube-agents.namespace" .) .Values.postgres.database | quote }}
{{- end }}
