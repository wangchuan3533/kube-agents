{{- if .Values.nats.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: {{ include "kube-agents.namespace" . }}
  labels:
    {{- include "kube-agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
    app: nats
spec:
  serviceName: nats
  replicas: {{ .Values.nats.replicas }}
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: "{{ .Values.nats.image.repository }}:{{ .Values.nats.image.tag }}"
          ports:
            - containerPort: {{ .Values.nats.clientPort }}
              name: client
            - containerPort: {{ .Values.nats.monitorPort }}
              name: monitor
          args:
            - "--config"
            - "/etc/nats/nats.conf"
          volumeMounts:
            - name: config
              mountPath: /etc/nats
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.nats.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.nats.monitorPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: nats-config
        {{- if not .Values.nats.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
  {{- if .Values.nats.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [{{ .Values.nats.persistence.accessMode | quote }}]
        resources:
          requests:
            storage: {{ .Values.nats.persistence.size }}
  {{- end }}
{{- end }}
