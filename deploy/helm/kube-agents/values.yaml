global:
  namespace: kube-agents

nats:
  enabled: true
  image:
    repository: nats
    tag: "2.10-alpine"
  replicas: 1
  clientPort: 4222
  monitorPort: 8222
  jetstream:
    maxMem: "1G"
    maxFile: "10G"
  persistence:
    enabled: false
    size: "10Gi"
    accessMode: ReadWriteOnce
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

operator:
  enabled: true
  image:
    repository: kube-agents/operator
    tag: latest
    pullPolicy: Never
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

postgres:
  enabled: true
  image:
    repository: 192.168.1.50:5000/postgres
    tag: "16-alpine"
  database: kubeagents
  user: kubeagents
  password: kubeagents  # override in production
  persistence:
    enabled: true
    size: "5Gi"
    storageClassName: "local-path"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

dashboard:
  enabled: true
  image:
    repository: 192.168.1.50:5000/kube-agents/dashboard
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 3001
  service:
    type: NodePort
    nodePort: 30080
  nats:
    url: ""  # auto-detected from NATS service if empty
  database:
    url: ""  # auto-constructed from postgres service if empty
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

demoAgents:
  enabled: false
  domain: agents.mycompany.com
